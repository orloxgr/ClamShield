<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClamShield Results Reminder</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
      border: 1px solid rgba(245, 158, 11, 0.35);
    }

    .wrap {
      height: 100%;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(245, 158, 11, 0.16);
      color: #fbbf24;
      font-weight: 800;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      color: #f8fafc;
    }

    .sub {
      margin-top: 2px;
      font-size: 12px;
      color: #fcd34d;
    }

    .details {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.45;
      display: grid;
      align-content: center;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    .secondary {
      background: #1e293b;
      color: #cbd5e1;
      border-color: #334155;
    }

    .warning {
      background: #d97706;
      border-color: #f59e0b;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <div class="icon">!</div>
      <div>
        <h1>Undecided suspicious files</h1>
        <div id="count" class="sub"></div>
      </div>
    </section>

    <section class="details">
      You have undecided actions for suspicious files.
    </section>

    <section class="actions">
      <button id="remind10" class="secondary" type="button">10 minutes</button>
      <button id="remind60" class="secondary" type="button">1 hour</button>
      <button id="forget" class="secondary" type="button">Forget</button>
      <button id="open" class="warning" type="button">Open Results</button>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const port = params.get("port") || window.location.port;
    const count = params.get("count") || "0";
    document.getElementById("count").textContent = `${count} item${count === "1" ? "" : "s"} waiting`;

    async function sendAction(action, closeAfter = true) {
      const buttons = document.querySelectorAll("button");
      buttons.forEach(button => button.disabled = true);
      try {
        const response = await fetch(`http://127.0.0.1:${port}/api/results-reminder/action`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action })
        });
        if (!response.ok) throw new Error("Action failed");
        if (closeAfter) window.close();
      } catch {
        buttons.forEach(button => button.disabled = false);
      }
    }

    document.getElementById("remind10").addEventListener("click", () => sendAction("remind-10"));
    document.getElementById("remind60").addEventListener("click", () => sendAction("remind-60"));
    document.getElementById("forget").addEventListener("click", () => sendAction("forget"));
    document.getElementById("open").addEventListener("click", async () => {
      await sendAction("open", false);
      window.location.href = `http://127.0.0.1:${port}/results`;
    });
  </script>
</body>
</html>
