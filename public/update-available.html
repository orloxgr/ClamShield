<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClamShield Update</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
      border: 1px solid rgba(34, 211, 238, 0.35);
    }

    .wrap {
      height: 100%;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(34, 211, 238, 0.14);
      color: #67e8f9;
      font-weight: 800;
      border: 1px solid rgba(34, 211, 238, 0.35);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      color: #f8fafc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub {
      margin-top: 2px;
      font-size: 12px;
      color: #67e8f9;
    }

    .details {
      display: grid;
      gap: 5px;
      align-content: center;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.35;
      min-width: 0;
    }

    .muted {
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .secondary {
      background: #1e293b;
      color: #cbd5e1;
      border-color: #334155;
    }

    .primary {
      background: #0891b2;
      border-color: #22d3ee;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="header">
      <div class="icon">↑</div>
      <div>
        <h1 id="title">Update available</h1>
        <div id="subtitle" class="sub"></div>
      </div>
    </section>

    <section class="details">
      <div id="message"></div>
      <div id="current" class="muted"></div>
    </section>

    <section class="actions">
      <button id="remind" class="secondary" type="button">Remind tomorrow</button>
      <button id="skip" class="secondary" type="button">Skip version</button>
      <button id="install" class="primary" type="button">Install</button>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const port = params.get("port") || window.location.port;
    const label = params.get("label") || "Update";
    const currentVersion = params.get("current") || "Unknown";
    const latestVersion = params.get("latest") || "Unknown";
    const installPath = params.get("installPath") || "";
    const skipPath = params.get("skipPath") || "";
    const remindPath = params.get("remindPath") || "";
    const mode = params.get("mode") || "available";

    if (mode === "failed") {
      document.getElementById("title").textContent = `${label} update check failed`;
      document.getElementById("subtitle").textContent = "Check Updates";
      document.getElementById("message").textContent = `Could not check ${label} updates.`;
      document.getElementById("current").textContent = currentVersion;
      document.getElementById("install").textContent = "Open Updates";
      document.getElementById("skip").style.display = "none";
      document.getElementById("remind").style.display = "none";
    } else {
      document.getElementById("title").textContent = `${label} update available`;
      document.getElementById("subtitle").textContent = latestVersion;
      document.getElementById("message").textContent = `${label} ${latestVersion} is available.`;
      document.getElementById("current").textContent = `Installed: ${currentVersion}`;
    }

    function disableButtons() {
      document.querySelectorAll("button").forEach(button => button.disabled = true);
    }

    async function postJson(path, body = {}) {
      const response = await fetch(`http://127.0.0.1:${port}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || "Action failed");
      }
      return response.json().catch(() => ({}));
    }

    document.getElementById("install").addEventListener("click", async () => {
      disableButtons();
      if (mode === "failed") {
        window.location.href = `http://127.0.0.1:${port}/updates`;
        return;
      }
      try {
        await postJson(installPath);
        window.location.href = `http://127.0.0.1:${port}/updates`;
      } catch {
        window.close();
      }
    });

    document.getElementById("skip").addEventListener("click", async () => {
      disableButtons();
      try {
        await postJson(skipPath, { version: latestVersion });
      } finally {
        window.close();
      }
    });

    document.getElementById("remind").addEventListener("click", async () => {
      disableButtons();
      try {
        await postJson(remindPath, { remindAfter: Date.now() + 24 * 60 * 60 * 1000 });
      } finally {
        window.close();
      }
    });
  </script>
</body>
</html>
